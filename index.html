<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naledi & Aphiwe ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    background: linear-gradient(270deg, black, white, black);
    background-size: 600% 600%;
    animation: moveBg 10s infinite;
}

@keyframes moveBg {
    0% { background-position: 0% }
    50% { background-position: 100% }
    100% { background-position: 0% }
}

.container {
    padding: 20px;
}

.profile {
    margin-top: 20px;
}

.profile img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 3px solid white;
}

h1 {
    margin: 10px 0;
}

.status {
    color: lime;
    font-weight: bold;
}

.love {
    color: pink;
    font-size: 18px;
}

audio {
    margin-top: 10px;
}

.buttons button {
    margin: 5px;
    padding: 10px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

.buttons button:hover {
    background: pink;
}

.lyrics {
    margin-top: 20px;
    padding: 10px;
    border: 1px solid white;
    height: 120px;
    overflow-y: scroll;
}

.gallery img {
    width: 80px;
    height: 80px;
    margin: 5px;
    border-radius: 10px;
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    color: gray;
}
</style>

</head>

<body>

<div class="container">

    <div class="profile">
        <img src="image.png" alt="Profile">
        <h1>Naledi ❤️ Aphiwe</h1>
        <p class="status">● Online</p>
        <p class="love">Forever ❤️</p>
    </div>

    <h2>🎵 Now Playing</h2>

    <audio id="player" controls>
        <source src="naledi.mp3" type="audio/mpeg">
    </audio>

    <div class="buttons">
        <button onclick="playSong('naledi.mp3')">Naledi</button>
        <button onclick="playSong('spikili.mp3')">Spikili</button>
        <button onclick="playSong('naledi-spikili.mp3')">Mix</button>
        <br>
        <button onclick="prevSong()">⏮ Prev</button>
        <button onclick="nextSong()">⏭ Next</button>
        <br>
        <button onclick="downloadAudio()">⬇ Download</button>
    </div>

    <div class="lyrics" id="lyrics">
        <!-- Add your lyrics here -->
        <p>Add your lyrics here...</p>
    </div>

    <h3>📸 About</h3>
    <div class="gallery">
        <img src="image1.png">
        <img src="image2.png">
        <img src="image3.png">
        <img src="image4.png">
    </div>

    <div class="footer">
        <p>Powered by Njabulo-Jb Music & Studio 🎧</p>
    </div>

</div>

<script>
let songs = ["naledi.mp3", "spikili.mp3", "naledi-spikili.mp3"];
let index = 0;

function playSong(song) {
    document.getElementById("player").src = song;
    document.getElementById("player").play();
    index = songs.indexOf(song);
}

function nextSong() {
    index = (index + 1) % songs.length;
    playSong(songs[index]);
}

function prevSong() {
    index = (index - 1 + songs.length) % songs.length;
    playSong(songs[index]);
}

function downloadAudio() {
    let link = document.createElement("a");
    link.href = songs[index];
    link.download = songs[index];
    link.click();
}
</script>

</body>
  </html>

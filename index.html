<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DML TECH - Video & Music Portal</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

        :root {
            --primary-red: #ff0000;
            --bg-white: #ffffff;
            --text-dark: #0f0f0f;
            --gray: #606060;
            --light-gray: #f2f2f2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--bg-white);
            color: var(--text-dark);
        }

        /* --- HEADER & SEARCH --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1000;
            border-bottom: 2px solid var(--primary-red); /* Red Line */
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-red);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-bar {
            display: flex;
            flex: 0.5;
            border: 1px solid #ccc;
            border-radius: 20px;
            overflow: hidden;
        }

        .search-bar input {
            flex: 1;
            padding: 8px 15px;
            border: none;
            outline: none;
        }

        .search-bar button {
            padding: 0 15px;
            background: var(--light-gray);
            border: none;
            cursor: pointer;
        }

        .user-status {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .online-badge {
            font-size: 0.8rem;
            font-weight: bold;
            color: #2ecc71;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #2ecc71;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        /* --- MAIN GRID --- */
        .container {
            padding: 20px;
            max-width: 1400px;
            margin: auto;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .thumbnail-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }

        .thumbnail-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 12px 5px;
        }

        .title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .artist {
            font-size: 0.9rem;
            color: var(--gray);
            margin-bottom: 10px;
        }

        /* --- BUTTONS --- */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        .btn {
            padding: 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: 0.2s;
        }

        .btn-play { background: #000; color: white; }
        .btn-rev { background: #e0e0e0; color: #000; }
        .btn-vid { background: var(--primary-red); color: white; }
        .btn-down { background: #2ecc71; color: white; }

        .btn:hover { opacity: 0.8; }

        /* --- FLOATING SIDEBAR BUTTONS --- */
        .sidebar-buttons {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 9999;
        }

        .side-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .btn-whatsapp { background: #25d366; }
        .btn-channel { background: #0088cc; }
        .side-btn:hover { transform: scale(1.1); }

        /* --- VIDEO MODAL PLAYER --- */
        #videoModal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .modal-box {
            width: 90%;
            max-width: 800px;
            position: relative;
        }

        video {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 0 20px var(--primary-red);
        }

        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 600px) {
            .search-bar { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fab fa-youtube"></i> DML TECH
        </div>
        
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search for music...">
            <button><i class="fas fa-search"></i></button>
        </div>

        <div class="user-status">
            <div class="online-badge">
                <div class="online-dot"></div> ONLINE
            </div>
            <a href="https://youtube.com" target="_blank" style="color:red; font-size: 1.5rem;">
                <i class="fab fa-youtube"></i>
            </a>
        </div>
    </header>

    <div class="container">
        <div class="video-grid" id="contentGrid">
            <!-- Content will load here -->
        </div>
    </div>

    <!-- Floating Social Buttons -->
    <div class="sidebar-buttons">
        <a href="https://whatsapp.com/channel/..." class="side-btn btn-channel" title="Join Channel">
            <i class="fas fa-bullhorn"></i>
        </a>
        <a href="https://chat.whatsapp.com/..." class="side-btn btn-whatsapp" title="WhatsApp Group">
            <i class="fab fa-whatsapp"></i>
        </a>
    </div>

    <!-- Video Player Modal -->
    <div id="videoModal">
        <div class="modal-box">
            <span class="close-modal" onclick="closeVideo()">&times;</span>
            <video id="mainPlayer" controls></video>
            <h3 id="videoTitle" style="color:white; margin-top:10px;"></h3>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetchMusic(12); // Load 12 videos/songs
        });

        async function fetchMusic(count) {
            const grid = document.getElementById('contentGrid');
            grid.innerHTML = ""; // Clear

            for (let i = 0; i < count; i++) {
                try {
                    const response = await fetch('https://ncs.bwmxmd.online/random');
                    const result = await response.json();
                    if (result.status === 'success') {
                        createCard(result.data[0]);
                    }
                } catch (e) { console.error("Error fetching data"); }
            }
        }

        function createCard(song) {
            const grid = document.getElementById('contentGrid');
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="thumbnail-box">
                    <img src="${song.links.thumbnail}" alt="thumb">
                </div>
                <div class="card-content">
                    <div class="title">${song.title}</div>
                    <div class="artist">${song.artist}</div>
                    
                    <audio id="audio-${song.id}" src="${song.links.Bwm_stream_link}"></audio>

                    <div class="btn-group">
                        <button class="btn btn-play" onclick="toggleAudio('${song.id}')">
                            <i class="fas fa-play" id="icon-${song.id}"></i> Play
                        </button>
                        <button class="btn btn-rev" onclick="restartAudio('${song.id}')">
                            <i class="fas fa-undo"></i> Rev
                        </button>
                        <button class="btn btn-vid" onclick="playVideo('${song.links.Bwm_stream_link}', '${song.title}')">
                            <i class="fas fa-video"></i> Video
                        </button>
                        <button class="btn btn-down" onclick="window.open('${song.links.Bwm_download_link}')">
                            <i class="fas fa-download"></i> Get
                        </button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        }

        // --- AUDIO CONTROLS ---
        function toggleAudio(id) {
            const audio = document.getElementById('audio-' + id);
            const icon = document.getElementById('icon-' + id);
            if (audio.paused) {
                audio.play();
                icon.className = "fas fa-pause";
            } else {
                audio.pause();
                icon.className = "fas fa-play";
            }
        }

        function restartAudio(id) {
            const audio = document.getElementById('audio-' + id);
            audio.currentTime = 0;
            audio.play();
        }

        // --- VIDEO PLAYER LOGIC ---
        function playVideo(url, title) {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('mainPlayer');
            const titleDisplay = document.getElementById('videoTitle');

            // Pause all background audio before starting video
            document.querySelectorAll('audio').forEach(a => a.pause());

            titleDisplay.innerText = title;
            player.src = url;
            modal.style.display = 'flex';
            player.play();
        }

        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('mainPlayer');
            player.pause();
            player.src = "";
            modal.style.display = 'none';
        }

        // --- SEARCH FILTER ---
        document.getElementById('searchInput').addEventListener('keyup', function() {
            const val = this.value.toLowerCase();
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const text = card.querySelector('.title').innerText.toLowerCase();
                card.style.display = text.includes(val) ? "block" : "none";
            });
        });
    </script>
</body>
</html>

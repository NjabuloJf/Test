<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Njabulo Jb - MP3 & MP4 Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        /* Liquid Glass Effect */
        .glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        .glass-strong {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        /* Header */
        .header {
            padding: 20px;
            margin: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .profile-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.5);
            object-fit: cover;
        }

        .profile-info h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 5px;
        }

        .profile-info p {
            font-size: 14px;
            color: #666;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.2);
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        /* Status Bar */
        .status-bar {
            margin: 0 20px 20px 20px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-stats {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #333;
        }

        .github-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: #333;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .github-link:hover {
            background: #555;
            transform: scale(1.05);
        }

        /* Search Section */
        .search-section {
            margin: 0 20px 30px 20px;
            padding: 30px;
            text-align: center;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 15px 60px 15px 20px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
            outline: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .search-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            background: #5a6fd8;
            transform: translateY(-50%) scale(1.1);
        }

        /* Video Grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 0 20px;
            margin-bottom: 50px;
        }

        .video-card {
            padding: 20px;
            border-radius: 15px;
            transition: all 0.3s ease;
            position: relative;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .video-thumbnail {
            width: 100%;
            height: 180px;
            border-radius: 10px;
            object-fit: cover;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .video-info h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: #333;
            line-height: 1.4;
        }

        .video-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 12px;
            color: #666;
        }

        .video-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .action-btn {
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.3s ease;
            position: relative;
        }

        .btn-download-mp3 {
            background: #4CAF50;
            color: white;
        }

        .btn-download-mp4 {
            background: #2196F3;
            color: white;
        }

        .btn-watch {
            background: #FF5722;
            color: white;
        }

        .btn-play {
            background: #9C27B0;
            color: white;
        }

        .action-btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .action-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Modal for Video/Audio Player */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            max-width: 90%;
            max-height: 90%;
            overflow: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-modal {
            background: #ff4444;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
        }

        .media-player {
            width: 100%;
            max-width: 800px;
            border-radius: 10px;
        }

        .audio-player {
            width: 100%;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            text-align: center;
        }

        .audio-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .audio-controls button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .audio-controls button:hover {
            background: #5a6fd8;
            transform: scale(1.1);
        }

        /* Loading States */
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin: 20px;
            text-align: center;
        }

        .success {
            background: #e8f5e8;
            color: #2e7d32;
            padding: 15px;
            border-radius: 10px;
            margin: 20px;
            text-align: center;
        }

        /* Progress Bar */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            margin: 10px 0;
            overflow: hidden;
        }

         .progress-fill {
            height: 100%;
            background: #667eea;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            margin-top: 50px;
            background: rgba(0, 0, 0, 0.1);
            color: #333;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 20px;
            }

            .nav-menu {
                flex-wrap: wrap;
                justify-content: center;
            }

            .status-bar {
                flex-direction: column;
                gap: 15px;
            }

            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 15px;
            }

            .modal-content {
                width: 95%;
                padding: 20px;
            }
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header glass">
        <div class="profile-section">
            <img src="public/fanajb.png" alt="Njabulo Jb" class="profile-img">
            <div class="profile-info">
                <h1>Njabulo Jb</h1>
                <p>MP3 & MP4 Downloader</p>
            </div>
        </div>
        <nav class="nav-menu">
            <div class="nav-item" onclick="showSection('groups')">
                <i class="fas fa-users"></i>
                <span>Groups</span>
            </div>
            <div class="nav-item" onclick="showSection('channels')">
                <i class="fas fa-broadcast-tower"></i>
                <span>Channels</span>
            </div>
            <div class="nav-item" onclick="showSection('trending')">
                <i class="fas fa-fire"></i>
                <span>Trending</span>
            </div>
        </nav>
    </div>

    <!-- Status Bar -->
    <div class="status-bar glass">
        <div class="user-stats">
            <div class="stat-item">
                <i class="fas fa-users"></i>
                <span id="totalUsers">1,247</span>
                <span>Total Users</span>
            </div>
            <div class="stat-item">
                <i class="fas fa-heart"></i>
                <span id="totalLikes">5,892</span>
                <span>Likes</span>
            </div>
        </div>
        <a href="https://github.com/NjabuloJ/Njabulo-Jb" class="github-link" target="_blank">
            <i class="fab fa-github"></i>
            <i class="fas fa-star"></i>
            <span>Star Repository</span>
        </a>
    </div>

    <!-- Search Section -->
    <div class="search-section glass">
        <h2 style="margin-bottom: 20px; color: #333;">Search & Download MP3/MP4</h2>
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="Enter song name, artist, or YouTube URL...">
            <button class="search-btn" onclick="searchVideos()">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </div>

    <!-- Loading/Error Messages -->
    <div id="messageContainer"></div>

    <!-- Video Grid -->
    <div class="video-grid" id="videoGrid">
        <!-- Videos will be loaded here -->
    </div>

    <!-- Modal for Video/Audio Player -->
    <div id="mediaModal" class="modal">
        <div class="modal-content glass-strong">
            <div class="modal-header">
                <h3 id="modalTitle">Media Player</h3>
                <button class="close-modal" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="modalBody">
                <!-- Media player will be inserted here -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p><strong>Made by Njabulo Jb Tech 2026</strong></p>
        <p>Professional MP3 & MP4 Downloader</p>
    </div>

    <script>
        // Global variables
        let currentVideos = [];
        let currentAudio = null;
        let currentVideo = null;

        // Initialize the app
        document.addEventListener('DOMContentLoaded', function() {
            loadDefaultVideos();
            setupEventListeners();
        });

        // Setup event listeners
        function setupEventListeners() {
            // Enter key for search
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    searchVideos();
                }
            });

            // Close modal when clicking outside
            document.getElementById('mediaModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeModal();
                }
            });
        }

        // Show message to user
        function showMessage(message, type = 'info') {
            const container = document.getElementById('messageContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = type;
            messageDiv.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-triangle' : type === 'success' ? 'check-circle' : 'info-circle'}"></i> ${message}`;
            
            container.innerHTML = '';
            container.appendChild(messageDiv);
            
            // Auto remove after 5 seconds
            setTimeout(() => {
                messageDiv.remove();
            }, 5000);
        }

        // Search videos function - FIXED
        async function searchVideos() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                showMessage('Please enter a search term', 'error');
                return;
            }

            showLoading();
            
            try {
                // Use YouTube search API or similar service
                const searchResults = await performRealSearch(query);
                currentVideos = searchResults;
                displayVideos(searchResults);
                showMessage(`Found ${searchResults.length} results for "${query}"`, 'success');
            } catch (error) {
                console.error('Search error:', error);
                // Fallback to mock search with relevant images
                const mockResults = await simulateSearch(query);
                currentVideos = mockResults;
                displayVideos(mockResults);
                showMessage(`Showing mock results for "${query}" - API may be unavailable`, 'info');
            }
        }

        // Real search function (you can integrate with YouTube API)
        async function performRealSearch(query) {
            // This would be your actual YouTube API call
            // For now, return enhanced mock data
            return generateEnhancedMockVideos(20, query);
        }

        // Enhanced mock search with better image matching
        async function simulateSearch(query) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    const mockResults = generateEnhancedMockVideos(20, query);
                    resolve(mockResults);
                }, 1000);
            });
        }

        // Load default videos
        function loadDefaultVideos() {
            showLoading();
            setTimeout(() => {
                const defaultVideos = generateEnhancedMockVideos(200);
                currentVideos = defaultVideos;
                displayVideos(defaultVideos);
            }, 500);
        }

        // Enhanced mock video generation with better thumbnails
        function generateEnhancedMockVideos(count, searchTerm = '') {
            const videos = [];
            const artists = ['Drake', 'Taylor Swift', 'Ed Sheeran', 'Billie Eilish', 'The Weeknd', 'Ariana Grande', 'Post Malone', 'Dua Lipa', 'Justin Bieber', 'Olivia Rodrigo'];
            const genres = ['Pop', 'Hip Hop', 'Rock', 'R&B', 'Electronic', 'Country', 'Jazz', 'Classical'];
            
        // Music-related image categories for better thumbnails
        const imageCategories = ['music', 'concert', 'studio', 'instruments', 'headphones', 'microphone', 'guitar', 'piano'];
        
        for (let i = 0; i < count; i++) {
            const artist = artists[Math.floor(Math.random() * artists.length)];
            const genre = genres[Math.floor(Math.random() * genres.length)];
            const category = imageCategories[Math.floor(Math.random() * imageCategories.length)];
            const title = searchTerm ? `${searchTerm} - ${artist}` : `${genre} Song ${i + 1} - ${artist}`;
            
            // Generate better thumbnails based on search term or category
            let thumbnailUrl;
            if (searchTerm) {
                // Use search term for more relevant images
                thumbnailUrl = `https://picsum.photos/320/180?random=${i}&blur=1`;
            } else {
                thumbnailUrl = `https://picsum.photos/320/180?random=${i}`;
            }
            
            videos.push({
                id: `video_${i}_${Date.now()}`,
                videoId: `https://www.youtube.com/watch?v=dQw4w9WgXcQ`, // Use actual YouTube URL format
                title: title,
                artist: artist,
                thumbnail: thumbnailUrl,
                duration: `${Math.floor(Math.random() * 5) + 2}:${String(Math.floor(Math.random() * 60)).padStart(2, '0')}`,
                uploadDate: new Date(Date.now() - Math.random() * 365 * 24 * 60 * 60 * 1000).toLocaleDateString(),
                views: `${Math.floor(Math.random() * 1000)}K views`
            });
        }
        return videos;
    }

    // Display videos in grid
    function displayVideos(videos) {
        const grid = document.getElementById('videoGrid');
        grid.innerHTML = '';

        videos.forEach((video, index) => {
            const videoCard = document.createElement('div');
            videoCard.className = 'video-card glass fade-in';
            videoCard.style.animationDelay = `${index * 0.1}s`;
            
            videoCard.innerHTML = `
                <img src="${video.thumbnail}" alt="${video.title}" class="video-thumbnail" onclick="watchVideo('${video.id}')">
                <div class="video-info">
                    <h3>${video.title}</h3>
                    <div class="video-meta">
                        <span><i class="fas fa-user"></i> ${video.artist}</span>
                        <span><i class="fas fa-calendar"></i> ${video.uploadDate}</span>
                    </div>
                    <div class="video-meta">
                        <span><i class="fas fa-clock"></i> ${video.duration}</span>
                        <span><i class="fas fa-eye"></i> ${video.views}</span>
                    </div>
                </div>
                <div class="video-actions">
                    <button class="action-btn btn-download-mp3" onclick="downloadMP3('${video.id}')">
                        <i class="fas fa-download"></i> MP3
                    </button>
                    <button class="action-btn btn-download-mp4" onclick="downloadMP4('${video.id}')">
                        <i class="fas fa-download"></i> MP4
                    </button>
                    <button class="action-btn btn-watch" onclick="watchVideo('${video.id}')">
                        <i class="fas fa-play"></i> Watch
                    </button>
                    <button class="action-btn btn-play" onclick="playAudio('${video.id}')">
                        <i class="fas fa-music"></i> Play
                    </button>
                </div>
            `;
            
            grid.appendChild(videoCard);
        });
    }

    // Show loading state
    function showLoading() {
        const grid = document.getElementById('videoGrid');
        grid.innerHTML = `
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading videos...</p>
            </div>
        `;
    }

    // Download MP3 function - ENHANCED ERROR HANDLING
    async function downloadMP3(videoId) {
        const video = currentVideos.find(v => v.id === videoId);
        if (!video) return;

        const button = event.target.closest('.action-btn');
        const originalText = button.innerHTML;
        
        try {
            button.disabled = true;
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            
            showMessage('Processing MP3 download...', 'info');
            
            // Enhanced API call with better error handling
            const apiURL = `https://api.cobalt.tools/api/json`;
            const response = await axios.post(apiURL, {
                url: video.videoId,
                vCodec: 'h264',
                vQuality: '720',
                aFormat: 'mp3',
                isAudioOnly: true
            }, {
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                timeout: 30000 // 30 second timeout
            });
            
            if (response.data && response.data.url) {
                // Create download link
                const downloadLink = document.createElement('a');
                downloadLink.href = response.data.url;
                downloadLink.download = `${video.title}.mp3`;
                downloadLink.style.display = 'none';
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
                
                showMessage(`MP3 download started: ${video.title}`, 'success');
            } else {
                throw new Error('No download URL received from server');
            }
            
        } catch (error) {
            console.error('MP3 Download error:', error);
            
            // Fallback to alternative API
            try {
                showMessage('Trying alternative download method...', 'info');
                const fallbackURL = `https://youtube-mp36.p.rapidapi.com/dl?id=${extractVideoId(video.videoId)}`;
                const fallbackResponse = await axios.get(fallbackURL, {
                    headers: {
                        'X-RapidAPI-Key': 'your-rapidapi-key-here', // You need to add your API key
                        'X-RapidAPI-Host': 'youtube-mp36.p.rapidapi.com'
                    }
                });
                
                if (fallbackResponse.data && fallbackResponse.data.link) {
                    window.open(fallbackResponse.data.link, '_blank');
                    showMessage(`MP3 download started: ${video.title}`, 'success');
                } else {
                    throw new Error('Fallback API also failed');
                }
            } catch (fallbackError) {
                showMessage(`Download failed: Please try again later`, 'error');
            }
        } finally {
            button.disabled = false;
            button.innerHTML = originalText;
        }
    }

    // Download MP4 function - ENHANCED ERROR HANDLING
    async function downloadMP4(videoId) {
        const video = currentVideos.find(v => v.id === videoId);
        if (!video) return;

        const button = event.target.closest('.action-btn');
        const originalText = button.innerHTML;
        
        try {
            button.disabled = true;
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            
            showMessage('Processing MP4 download...', 'info');
            
            // Enhanced API call with better error handling
            const apiURL = `https://api.cobalt.tools/api/json`;
            const response = await axios.post(apiURL, {
                url: video.videoId,
                vCodec: 'h264',
                vQuality: '720',
                aFormat: 'mp3',
                isAudioOnly: false
            }, {
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                timeout: 30000 // 30 second timeout
            });
            
            if (response.data && response.data.url) {
                // Create download link
                const downloadLink = document.createElement('a');
                downloadLink.href = response.data.url;
                downloadLink.download = `${video.title}.mp4`;
                downloadLink.style.display = 'none';
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
                
                showMessage(`MP4 download started: ${video.title}`, 'success');
            } else {
                throw new Error('No download URL received from server');
            }
            
        } catch (error) {
            console.error('MP4 Download error:', error);
            showMessage(`Download failed: Please try again later`, 'error');
        } finally {
            button.disabled = false;
            button.innerHTML = originalText;
        }
    }

    // Extract video ID from YouTube URL
    function extractVideoId(url) {
        const regex = /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/;
        const match = url.match(regex);
        return match ? match[1] : url;
    }

    // Watch video function - FIXED AUDIO LOADING ERROR
    async function watchVideo(videoId) {
        const video = currentVideos.find(v => v.id === videoId);
        if (!video) return;

    // Play audio function - FIXED 500 ERROR

                    url: video.videoId,
                    vCodec: 'h264',
                    vQuality: '720',
                    aFormat: 'mp3',
                    isAudioOnly: true
                }, {
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'

    // Open in YouTube function

    // Share audio function
    function shareAudio(videoId) {
        const video = currentVideos.find(v => v.id === videoId);
        if (!video) return;
        
        if (navigator.share) {
            navigator.share({
                title: video.title,
                text: `Check out this song: ${video.title} by ${video.artist}`,
                url: video.videoId
            });
        } else {
            // Fallback: copy to clipboard
            navigator.clipboard.writeText(video.videoId).then(() => {
                showMessage('Link copied to clipboard!', 'success');
            });
        }
    }

    // Add to playlist function
    function addToPlaylist(videoId) {
        const video = currentVideos.find(v => v.id === videoId);
        if (!video) return;
        
        // Store in localStorage for now
        let playlist = JSON.parse(localStorage.getItem('njabulo-playlist') || '[]');
        
        if (!playlist.find(v => v.id === videoId)) {
            playlist.push(video);
            localStorage.setItem('njabulo-playlist', JSON.stringify(playlist));
            showMessage(`Added "${video.title}" to playlist`, 'success');
        } else {
            showMessage('Song already in playlist', 'info');
        }

     // Setup audio controls with enhanced error handling
    function setupAudioControls() {
        if (!currentAudio) return;
        
        // Enhanced event listeners with error handling
        currentAudio.addEventListener('timeupdate', updateProgress);
        currentAudio.addEventListener('ended', nextTrack);
        currentAudio.addEventListener('loadstart', () => {
            console.log('Audio loading started...');
        });
        currentAudio.addEventListener('loadeddata', () => {
            console.log('Audio data loaded');
        });
        currentAudio.addEventListener('canplay', () => {
            console.log('Audio can start playing');
        });
        currentAudio.addEventListener('play', () => {
            const playBtn = document.getElementById('playPauseBtn');
            if (playBtn) playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        });
        currentAudio.addEventListener('pause', () => {
            const playBtn = document.getElementById('playPauseBtn');
            if (playBtn) playBtn.innerHTML = '<i class="fas fa-play"></i>';
        });
        currentAudio.addEventListener('error', (e) => {
            console.error('Audio error:', e);
            showMessage('Audio playback error. Trying alternative method...', 'error');
        });
        
        // Set volume to 70% by default
        currentAudio.volume = 0.7;
    }

    // Update progress bar
    function updateProgress() {
        if (!currentAudio) return;
        
        const progress = (currentAudio.currentTime / currentAudio.duration) * 100;
        const progressBar = document.getElementById('audioProgress');
        if (progressBar && !isNaN(progress)) {
            progressBar.style.width = progress + '%';
        }
    }

    // Toggle play/pause
    function togglePlayPause() {
        if (!currentAudio) return;
        
        try {
            if (currentAudio.paused) {
                currentAudio.play().catch(e => {
                    console.error('Play failed:', e);
                    showMessage('Playback failed. Please try again.', 'error');
                });
            } else {
                currentAudio.pause();
            }
        } catch (error) {
            console.error('Toggle play/pause error:', error);
        }
    }

    // Toggle mute
    function toggleMute() {
        if (!currentAudio) return;
        
        const muteBtn = document.getElementById('muteBtn');
        if (!muteBtn) return;
        
        if (currentAudio.muted) {
            currentAudio.muted = false;
            muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
        } else {
            currentAudio.muted = true;
            muteBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
        }
    }

    // Previous track
    function previousTrack() {
        if (!currentVideos.length) return;
        
        const currentIndex = currentVideos.findIndex(v => {
            if (currentAudio && currentAudio.src) {
                return currentAudio.src.includes(v.videoId) || currentAudio.src.includes(v.id);
            }
            return false;
        });
        
        if (currentIndex > 0) {
            closeModal();
            setTimeout(() => playAudio(currentVideos[currentIndex - 1].id), 300);
        } else {
            showMessage('This is the first track', 'info');
        }
    }

    // Next track
    function nextTrack() {
        if (!currentVideos.length) return;
        
        const currentIndex = currentVideos.findIndex(v => {
            if (currentAudio && currentAudio.src) {
                return currentAudio.src.includes(v.videoId) || currentAudio.src.includes(v.id);
            }
            return false;
        });
        
        if (currentIndex < currentVideos.length - 1) {
            closeModal();
            setTimeout(() => playAudio(currentVideos[currentIndex + 1].id), 300);
        } else {
            showMessage('This is the last track', 'info');
        }
    }

    // Close modal with cleanup
    function closeModal() {
        const modal = document.getElementById('mediaModal');
        modal.style.display = 'none';
        
        // Stop and cleanup media
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
            currentAudio.src = '';
            currentAudio = null;
        }
        
        if (currentVideo) {
            currentVideo.pause();
            currentVideo.currentTime = 0;
            currentVideo.src = '';
            currentVideo = null;
        }
        
        // Clear modal content
        document.getElementById('modalBody').innerHTML = '';
    }

    // Handle unhandled promise rejections

    // Enhanced keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        // ESC to close modal
        if (e.key === 'Escape') {
            closeModal();
        }
        
        // Space to play/pause (when modal is open)
        if (e.key === ' ' && (currentAudio || currentVideo)) {
            e.preventDefault();
            togglePlayPause();
        }
        
        // Arrow keys for previous/next track
        if (currentAudio) {
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                previousTrack();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                nextTrack();
            }
        }
        
        // Volume controls
        if (currentAudio) {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                currentAudio.volume = Math.min(1, currentAudio.volume + 0.1);
                showMessage(`Volume: ${Math.round(currentAudio.volume * 100)}%`, 'info');
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                currentAudio.volume = Math.max(0, currentAudio.volume - 0.1);
                showMessage(`Volume: ${Math.round(currentAudio.volume * 100)}%`, 'info');
            }
            
            // M key to mute/unmute
            if (e.key === 'm' || e.key === 'M') {
                e.preventDefault();
                toggleMute();
            }
        }
    });

    // Enhanced download progress tracking
    function trackDownloadProgress(url, filename) {
        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.responseType = 'blob';
            
            xhr.onprogress = function(e) {
                if (e.lengthComputable) {
                    const percentComplete = (e.loaded / e.total) * 100;
                    showMessage(`Downloading: ${Math.round(percentComplete)}%`, 'info');
                }
            };
            
            xhr.onload = function() {
                if (xhr.status === 200) {
                    const blob = xhr.response;
                    const downloadUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(downloadUrl);
                    resolve();
                } else {
                    reject(new Error(`Download failed with status ${xhr.status}`));
                }
            };
            
            xhr.onerror = function() {
                reject(new Error('Download failed'));
            };
            
            xhr.send();
        });
    }

    // Add download history
    function addToDownloadHistory(video, format) {
        let history = JSON.parse(localStorage.getItem('download-history') || '[]');
        const entry = {
            ...video,
            format: format,
            downloadDate: new Date().toISOString()
        };
        
        history.unshift(entry);
        // Keep only last 50 downloads
        history = history.slice(0, 50);
        
        localStorage.setItem('download-history', JSON.stringify(history));
    }

    function downloadAgain(videoId, format) {
        const video = JSON.parse(localStorage.getItem('download-history') || '[]')
            .find(item => item.id === videoId);
        
        if (video) {
            if (format === 'mp3') {
                downloadMP3(videoId);
            } else {
                downloadMP4(videoId);
            }
        }
    }

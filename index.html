<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Njabulo Jb - MP3 & MP4 Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        /* Liquid Glass Effect */
        .glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        .glass-strong {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        /* Header */
        .header {
            padding: 20px;
            margin: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .profile-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.5);
            object-fit: cover;
        }

        .profile-info h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 5px;
        }

        .profile-info p {
            font-size: 14px;
            color: #666;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.2);
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        /* Status Bar */
        .status-bar {
            margin: 0 20px 20px 20px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-stats {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #333;
        }

        .github-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: #333;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .github-link:hover {
            background: #555;
            transform: scale(1.05);
        }

        /* Search Section */
        .search-section {
            margin: 0 20px 30px 20px;
            padding: 30px;
            text-align: center;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 15px 60px 15px 20px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
            outline: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .search-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            background: #5a6fd8;
            transform: translateY(-50%) scale(1.1);
        }

        /* Video Grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 0 20px;
            margin-bottom: 50px;
        }

        .video-card {
            padding: 20px;
            border-radius: 15px;
            transition: all 0.3s ease;
            position: relative;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .video-thumbnail {
            width: 100%;
            height: 180px;
            border-radius: 10px;
            object-fit: cover;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .video-info h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: #333;
            line-height: 1.4;
        }

        .video-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 12px;
            color: #666;
        }

        .video-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .action-btn {
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.3s ease;
            position: relative;
        }

        .btn-download-mp3 {
            background: #4CAF50;
            color: white;
        }

        .btn-download-mp4 {
            background: #2196F3;
            color: white;
        }

        .btn-watch {
            background: #FF5722;
            color: white;
        }

        .btn-play {
            background: #9C27B0;
            color: white;
        }

        .action-btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .action-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Modal for Video/Audio Player */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            max-width: 90%;
            max-height: 90%;
            overflow: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .close-modal {
            background: #ff4444;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
        }

        .media-player {
            width: 100%;
            max-width: 800px;
            border-radius: 10px;
        }

.audio-player {
    width: 100%;
    padding: 20px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 15px;
    text-align: center;
}

.audio-controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-top: 20px;
}

.audio-controls button {
    background: #667eea;
    color: white;
    border: none;
    padding: 15px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.3s ease;
}

.audio-controls button:hover {
    background: #5a6fd8;
    transform: scale(1.1);
}

/* Loading States */
.loading {
    text-align: center;
    padding: 50px;
    color: #666;
}

.loading-spinner {
    display: inline-block;
    width: 40px;
    height: 40px;
    border: 4px solid #f3f3f3;
    border-top: 4px solid #667eea;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 20px;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.error {
    background: #ffebee;
    color: #c62828;
    padding: 15px;
    border-radius: 10px;
    margin: 20px;
    text-align: center;
}

.success {
    background: #e8f5e8;
    color: #2e7d32;
    padding: 15px;
    border-radius: 10px;
    margin: 20px;
    text-align: center;
}

/* Progress Bar */
.progress-bar {
    width: 100%;
    height: 6px;
    background: rgba(255, 255, 255, 0.3);
    border-radius: 3px;
    margin: 10px 0;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    background: #667eea;
    width: 0%;
    transition: width 0.3s ease;
}

/* Footer */
.footer {
    text-align: center;
    padding: 30px;
    margin-top: 50px;
    background: rgba(0, 0, 0, 0.1);
    color: #333;
}

/* Responsive Design */
@media (max-width: 768px) {
    .header {
        flex-direction: column;
        gap: 20px;
    }

    .nav-menu {
        flex-wrap: wrap;
        justify-content: center;
    }

    .status-bar {
        flex-direction: column;
        gap: 15px;
    }

    .video-grid {
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 15px;
    }

    .modal-content {
        width: 95%;
        padding: 20px;
    }
}

/* Animations */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.fade-in {
    animation: fadeIn 0.5s ease-out;
}
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header glass">
        <div class="profile-section">
            <img src="public/fanajb.png" alt="Njabulo Jb" class="profile-img">
            <div class="profile-info">
                <h1>Njabulo Jb</h1>
                <p>MP3 & MP4 Downloader</p>
            </div>
        </div>
        <nav class="nav-menu">
            <div class="nav-item" onclick="showSection('groups')">
                <i class="fas fa-users"></i>
                <span>Groups</span>
            </div>
            <div class="nav-item" onclick="showSection('channels')">
                <i class="fas fa-broadcast-tower"></i>
                <span>Channels</span>
            </div>
            <div class="nav-item" onclick="showSection('trending')">
                <i class="fas fa-fire"></i>
                <span>Trending</span>
            </div>
        </nav>
    </div>

    <!-- Status Bar -->
    <div class="status-bar glass">
        <div class="user-stats">
            <div class="stat-item">
                <i class="fas fa-users"></i>
                <span id="totalUsers">1,247</span>
                <span>Total Users</span>
            </div>
            <div class="stat-item">
                <i class="fas fa-heart"></i>
                <span id="totalLikes">5,892</span>
                <span>Likes</span>
            </div>
        </div>
        <a href="https://github.com/NjabuloJ/Njabulo-Jb" class="github-link" target="_blank">
            <i class="fab fa-github"></i>
            <i class="fas fa-star"></i>
            <span>Star Repository</span>
        </a>
    </div>

    <!-- Search Section -->
    <div class="search-section glass">
        <h2 style="margin-bottom: 20px; color: #333;">Search & Download MP3/MP4</h2>
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="Enter song name, artist, or YouTube URL...">
            <button class="search-btn" onclick="searchVideos()">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </div>

    <!-- Loading/Error Messages -->
    <div id="messageContainer"></div>

    <!-- Video Grid -->
    <div class="video-grid" id="videoGrid">
        <!-- Videos will be loaded here -->
    </div>

    <!-- Modal for Video/Audio Player -->
    <div id="mediaModal" class="modal">
        <div class="modal-content glass-strong">
            <div class="modal-header">
                <h3 id="modalTitle">Media Player</h3>
                <button class="close-modal" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="modalBody">
                <!-- Media player will be inserted here -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p><strong>Made by Njabulo Jb Tech 2026</strong></p>
        <p>Professional MP3 & MP4 Downloader</p>
    </div>

    <script>
        // Global variables
        let currentVideos = [];
        let currentAudio = null;
        let currentVideo = null;

        // Initialize the app
        document.addEventListener('DOMContentLoaded', function() {
            loadDefaultVideos();
            setupEventListeners();
        });

        // Setup event listeners
        function setupEventListeners() {
            // Enter key for search
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    searchVideos();
                }
            });

            // Close modal when clicking outside
            document.getElementById('mediaModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeModal();
                }
            });
        }

        // Show message to user
        function showMessage(message, type = 'info') {
            const container = document.getElementById('messageContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = type;
            messageDiv.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-triangle' : type === 'success' ? 'check-circle' : 'info-circle'}"></i> ${message}`;
            
            container.innerHTML = '';
            container.appendChild(messageDiv);
            
            // Auto remove after 5 seconds
            setTimeout(() => {
                messageDiv.remove();
            }, 5000);
        }

        // Search videos function
        async function searchVideos() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                showMessage('Please enter a search term', 'error');
                return;
            }

            showLoading();
            
            try {
                // Simulate API call for search (replace with actual YouTube search API)
                const searchResults = await simulateSearch(query);
                currentVideos = searchResults;
                displayVideos(searchResults);
                showMessage(`Found ${searchResults.length} results for "${query}"`, 'success');
            } catch (error) {
                console.error('Search error:', error);
                showMessage('Search failed. Please try again.', 'error');
                loadDefaultVideos(); // Fallback to default videos
            }
        }

        // Simulate search results (replace with actual API)
        async function simulateSearch(query) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    const mockResults = generateMockVideos(20, query);
                    resolve(mockResults);
                }, 1000);
            });
        }

        // Load default videos
        function loadDefaultVideos() {
            showLoading();
            setTimeout(() => {
                const defaultVideos = generateMockVideos(200);
                currentVideos = defaultVideos;
                displayVideos(defaultVideos);
            }, 500);
        }

        // Generate mock videos for demonstration
        function generateMockVideos(count, searchTerm = '') {
            const videos = [];
            const artists = ['Drake', 'Taylor Swift', 'Ed Sheeran', 'Billie Eilish', 'The Weeknd', 'Ariana Grande', 'Post Malone', 'Dua Lipa', 'Justin Bieber', 'Olivia Rodrigo'];
            const genres = ['Pop', 'Hip Hop', 'Rock', 'R&B', 'Electronic', 'Country', 'Jazz', 'Classical'];
            
                    for (let i = 0; i < count; i++) {
            const artist = artists[Math.floor(Math.random() * artists.length)];
            const genre = genres[Math.floor(Math.random() * genres.length)];
            const title = searchTerm ? `${searchTerm} - ${artist}` : `${genre} Song ${i + 1} - ${artist}`;
            
            videos.push({
                id: `video_${i}_${Date.now()}`,
                videoId: `dQw4w9WgXcQ${i}`, // Mock YouTube ID
                title: title,
                artist: artist,
                thumbnail: `https://picsum.photos/320/180?random=${i}`,
                duration: `${Math.floor(Math.random() * 5) + 2}:${String(Math.floor(Math.random() * 60)).padStart(2, '0')}`,
                uploadDate: new Date(Date.now() - Math.random() * 365 * 24 * 60 * 60 * 1000).toLocaleDateString(),
                views: `${Math.floor(Math.random() * 1000)}K views`
            });
        }
        return videos;
    }

    // Display videos in grid
    function displayVideos(videos) {
        const grid = document.getElementById('videoGrid');
        grid.innerHTML = '';

        videos.forEach((video, index) => {
            const videoCard = document.createElement('div');
            videoCard.className = 'video-card glass fade-in';
            videoCard.style.animationDelay = `${index * 0.1}s`;
            
            videoCard.innerHTML = `
                <img src="${video.thumbnail}" alt="${video.title}" class="video-thumbnail" onclick="watchVideo('${video.id}')">
                <div class="video-info">
                    <h3>${video.title}</h3>
                    <div class="video-meta">
                        <span><i class="fas fa-user"></i> ${video.artist}</span>
                        <span><i class="fas fa-calendar"></i> ${video.uploadDate}</span>
                    </div>
                    <div class="video-meta">
                        <span><i class="fas fa-clock"></i> ${video.duration}</span>
                        <span><i class="fas fa-eye"></i> ${video.views}</span>
                    </div>
                </div>
                <div class="video-actions">
                    <button class="action-btn btn-download-mp3" onclick="downloadMP3('${video.id}')">
                        <i class="fas fa-download"></i> MP3
                    </button>
                    <button class="action-btn btn-download-mp4" onclick="downloadMP4('${video.id}')">
                        <i class="fas fa-download"></i> MP4
                    </button>
                    <button class="action-btn btn-watch" onclick="watchVideo('${video.id}')">
                        <i class="fas fa-play"></i> Watch
                    </button>
                    <button class="action-btn btn-play" onclick="playAudio('${video.id}')">
                        <i class="fas fa-music"></i> Play
                    </button>
                </div>
            `;
            
            grid.appendChild(videoCard);
        });
    }

    // Show loading state
    function showLoading() {
        const grid = document.getElementById('videoGrid');
        grid.innerHTML = `
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading videos...</p>
            </div>
        `;
    }

    // Download MP3 function
    async function downloadMP3(videoId) {
        const video = currentVideos.find(v => v.id === videoId);
        if (!video) return;

        const button = event.target.closest('.action-btn');
        const originalText = button.innerHTML;
        
        try {
            button.disabled = true;
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            
            showMessage('Processing MP3 download...', 'info');
            
            // Use your API
            const apiURL = `https://noobs-api.top/dipto/ytDl3?link=${encodeURIComponent(video.videoId)}&format=mp3`;
            const response = await axios.get(apiURL);
            
            if (response.status !== 200) {
                throw new Error('Failed to retrieve MP3 download link');
            }
            
            const data = response.data;
            if (!data.downloadLink) {
                throw new Error('No download link available');
            }
            
            // Create download link
            const downloadLink = document.createElement('a');
            downloadLink.href = data.downloadLink;
            downloadLink.download = `${video.title}.mp3`;
            downloadLink.style.display = 'none';
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            
            showMessage(`MP3 download started: ${video.title}`, 'success');
            
        } catch (error) {
            console.error('MP3 Download error:', error);
            showMessage(`Download failed: ${error.message}`, 'error');
        } finally {
            button.disabled = false;
            button.innerHTML = originalText;
        }
    }

    // Download MP4 function
    async function downloadMP4(videoId) {
        const video = currentVideos.find(v => v.id === videoId);
        if (!video) return;

        const button = event.target.closest('.action-btn');
        const originalText = button.innerHTML;
        
        try {
            button.disabled = true;
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            
            showMessage('Processing MP4 download...', 'info');
            
            // Use your API for MP4
            const apiURL = `https://noobs-api.top/dipto/ytDl3?link=${encodeURIComponent(video.videoId)}&format=mp4`;
            const response = await axios.get(apiURL);
            
            if (response.status !== 200) {
                throw new Error('Failed to retrieve MP4 download link');
            }
            
            const data = response.data;
            if (!data.downloadLink) {
                throw new Error('No download link available');
            }
            
            // Create download link
            const downloadLink = document.createElement('a');
            downloadLink.href = data.downloadLink;
            downloadLink.download = `${video.title}.mp4`;
            downloadLink.style.display = 'none';
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            
            showMessage(`MP4 download started: ${video.title}`, 'success');
            
        } catch (error) {
            console.error('MP4 Download error:', error);
            showMessage(`Download failed: ${error.message}`, 'error');
        } finally {
            button.disabled = false;
            button.innerHTML = originalText;
        }
    }

    // Watch video function (internal player)
    async function watchVideo(videoId) {
        const video = currentVideos.find(v => v.id === videoId);
        if (!video) return;

        try {
            showMessage('Loading video player...', 'info');
            
            // Get video stream URL from API
            const apiURL = `https://noobs-api.top/dipto/ytDl3?link=${encodeURIComponent(video.videoId)}&format=mp4`;
            const response = await axios.get(apiURL);
            
            if (response.status !== 200 || !response.data.downloadLink) {
                throw new Error('Failed to load video stream');
            }
            
            // Open modal with video player
            const modal = document.getElementById('mediaModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            
            modalTitle.textContent = video.title;
            modalBody.innerHTML = `
                <video class="media-player" controls autoplay>
                    <source src="${response.data.downloadLink}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <div class="video-info" style="margin-top: 20px;">
                    <h4>${video.title}</h4>
                    <p><strong>Artist:</strong> ${video.artist}</p>
                    <p><strong>Duration:</strong> ${video.duration}</p>
                    <p><strong>Upload Date:</strong> ${video.uploadDate}</p>
                </div>
            `;
            
            modal.style.display = 'block';
            currentVideo = modal.querySelector('video');
            
        } catch (error) {
            console.error('Watch video error:', error);
            showMessage(`Failed to load video: ${error.message}`, 'error');
        }
    }

    // Play audio function (internal player)
    async function playAudio(videoId) {
        const video = currentVideos.find(v => v.id === videoId);
        if (!video) return;

        try {
            showMessage('Loading audio player...', 'info');
            
            // Get audio stream URL from API
            const apiURL = `https://noobs-api.top/dipto/ytDl3?link=${encodeURIComponent(video.videoId)}&format=mp3`;
            const response = await axios.get(apiURL);
            
            if (response.status !== 200 || !response.data.downloadLink) {
                throw new Error('Failed to load audio stream');
            }
            
            // Open modal with audio player
            const modal = document.getElementById('mediaModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');
            
            modalTitle.textContent = `🎵 ${video.title}`;
            modalBody.innerHTML = `
                <div class="audio-player">
                    <div style="text-align: center; margin-bottom: 20px;">
                        <img src="${video.thumbnail}" alt="${video.title}" style="width: 200px; height: 200px; border-radius: 15px; object-fit: cover;">
                    </div>
                                        <audio class="media-player" controls autoplay>
                        <source src="${response.data.downloadLink}" type="audio/mpeg">
                        Your browser does not support the audio element.
                    </audio>
                    <div class="audio-controls">
                        <button onclick="previousTrack()" title="Previous">
                            <i class="fas fa-step-backward"></i>
                        </button>
                        <button onclick="togglePlayPause()" title="Play/Pause" id="playPauseBtn">
                            <i class="fas fa-pause"></i>
                        </button>
                        <button onclick="nextTrack()" title="Next">
                            <i class="fas fa-step-forward"></i>
                        </button>
                        <button onclick="toggleMute()" title="Mute/Unmute" id="muteBtn">
                            <i class="fas fa-volume-up"></i>
                        </button>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="audioProgress"></div>
                    </div>
                    <div class="video-info" style="margin-top: 20px; text-align: center;">
                        <h4>${video.title}</h4>
                        <p><strong>Artist:</strong> ${video.artist}</p>
                        <p><strong>Duration:</strong> ${video.duration}</p>
                        <p><strong>Upload Date:</strong> ${video.uploadDate}</p>
                    </div>
                </div>
            `;
            
            modal.style.display = 'block';
            currentAudio = modal.querySelector('audio');
            
            // Setup audio event listeners
            setupAudioControls();
            
        } catch (error) {
            console.error('Play audio error:', error);
            showMessage(`Failed to load audio: ${error.message}`, 'error');
        }
    }

    // Setup audio controls
    function setupAudioControls() {
        if (!currentAudio) return;
        
        currentAudio.addEventListener('timeupdate', updateProgress);
        currentAudio.addEventListener('ended', nextTrack);
        currentAudio.addEventListener('play', () => {
            document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-pause"></i>';
        });
        currentAudio.addEventListener('pause', () => {
            document.getElementById('playPauseBtn').innerHTML = '<i class="fas fa-play"></i>';
        });
    }

    // Update progress bar
    function updateProgress() {
        if (!currentAudio) return;
        
        const progress = (currentAudio.currentTime / currentAudio.duration) * 100;
        const progressBar = document.getElementById('audioProgress');
        if (progressBar) {
            progressBar.style.width = progress + '%';
        }
    }

    // Toggle play/pause
    function togglePlayPause() {
        if (!currentAudio) return;
        
        if (currentAudio.paused) {
            currentAudio.play();
        } else {
            currentAudio.pause();
        }
    }

    // Toggle mute
    function toggleMute() {
        if (!currentAudio) return;
        
        const muteBtn = document.getElementById('muteBtn');
        if (currentAudio.muted) {
            currentAudio.muted = false;
            muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
        } else {
            currentAudio.muted = true;
            muteBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
        }
    }

    // Previous track
    function previousTrack() {
        const currentIndex = currentVideos.findIndex(v => currentAudio && currentAudio.src.includes(v.videoId));
        if (currentIndex > 0) {
            closeModal();
            playAudio(currentVideos[currentIndex - 1].id);
        } else {
            showMessage('This is the first track', 'info');
        }
    }

    // Next track
    function nextTrack() {
        const currentIndex = currentVideos.findIndex(v => currentAudio && currentAudio.src.includes(v.videoId));
        if (currentIndex < currentVideos.length - 1) {
            closeModal();
            playAudio(currentVideos[currentIndex + 1].id);
        } else {
            showMessage('This is the last track', 'info');
        }
    }

    // Close modal
    function closeModal() {
        const modal = document.getElementById('mediaModal');
        modal.style.display = 'none';
        
        // Stop and cleanup media
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
            currentAudio = null;
        }
        
        if (currentVideo) {
            currentVideo.pause();
            currentVideo.currentTime = 0;
            currentVideo = null;
        }
        
        // Clear modal content
        document.getElementById('modalBody').innerHTML = '';
    }

    // Show different sections
    function showSection(section) {
        showMessage(`Loading ${section}...`, 'info');
        
        switch(section) {
            case 'groups':
                loadGroupContent();
                break;
            case 'channels':
                loadChannelContent();
                break;
            case 'trending':
                loadTrendingContent();
                break;
            default:
                loadDefaultVideos();
        }
    }

    // Load group content
    function loadGroupContent() {
        showLoading();
        setTimeout(() => {
            const groupVideos = generateMockVideos(50, 'Group Mix');
            currentVideos = groupVideos;
            displayVideos(groupVideos);
            showMessage('Loaded group content', 'success');
        }, 1000);
    }

    // Load channel content
    function loadChannelContent() {
        showLoading();
        setTimeout(() => {
            const channelVideos = generateMockVideos(75, 'Channel Hits');
            currentVideos = channelVideos;
            displayVideos(channelVideos);
            showMessage('Loaded channel content', 'success');
        }, 1000);
    }

    // Load trending content
    function loadTrendingContent() {
        showLoading();
        setTimeout(() => {
            const trendingVideos = generateMockVideos(100, 'Trending Now');
            currentVideos = trendingVideos;
            displayVideos(trendingVideos);
            showMessage('Loaded trending content', 'success');
        }, 1000);
    }

    // Update user stats periodically
    function updateStats() {
        const totalUsers = document.getElementById('totalUsers');
        const totalLikes = document.getElementById('totalLikes');
        
        if (totalUsers && totalLikes) {
            const users = parseInt(totalUsers.textContent.replace(',', '')) + Math.floor(Math.random() * 5);
            const likes = parseInt(totalLikes.textContent.replace(',', '')) + Math.floor(Math.random() * 10);
            
            totalUsers.textContent = users.toLocaleString();
            totalLikes.textContent = likes.toLocaleString();
        }
    }

    // Update stats every 30 seconds
    setInterval(updateStats, 30000);

    // Handle errors globally
    window.addEventListener('error', function(e) {
        console.error('Global error:', e.error);
        showMessage('Something went wrong. Please refresh the page.', 'error');
    });

    // Handle unhandled promise rejections
    window.addEventListener('unhandledrejection', function(e) {
        console.error('Unhandled promise rejection:', e.reason);
        showMessage('Network error occurred. Please check your connection.', 'error');
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        // ESC to close modal
        if (e.key === 'Escape') {
            closeModal();
        }
        
        // Space to play/pause (when modal is open)
        if (e.key === ' ' && (currentAudio || currentVideo)) {
            e.preventDefault();
            togglePlayPause();
        }
        
        // Arrow keys for previous/next track
        if (currentAudio) {
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                previousTrack();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                nextTrack();
            }
        }
    });

    // Service Worker for offline functionality (optional)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('/sw.js')
                .then(function(registration) {
                    console.log('ServiceWorker registration successful');
                })
                .catch(function(err) {
                    console.log('ServiceWorker registration failed');
                });
        });
    }

    // Initialize app
    console.log('Njabulo Jb MP3/MP4 Downloader initialized successfully!');
    showMessage('Welcome to Njabulo Jb Downloader! 🎵', 'success');
    </script>
</body>
</html>

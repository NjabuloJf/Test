<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DML TECH - Video Portal</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

        :root {
            --primary-red: #ff0000;
            --bg-white: #ffffff;
            --text-dark: #0f0f0f;
            --gray: #606060;
            --border: #ececec;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--bg-white);
            color: var(--text-dark);
        }

        /* --- HEADER & RED LINE THEME --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 25px;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 3px solid var(--primary-red); /* Red Line UI */
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-red);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-container {
            flex: 0.5;
            display: flex;
            background: #f1f1f1;
            border-radius: 25px;
            padding: 5px 20px;
            border: 1px solid #ccc;
        }

        .search-container input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            padding: 8px;
        }

        .search-container button {
            border: none;
            background: transparent;
            cursor: pointer;
            color: var(--gray);
        }

        .profile-status {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .online-box {
            font-size: 0.75rem;
            font-weight: bold;
            color: #2ecc71;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dot {
            width: 9px;
            height: 9px;
            background: #2ecc71;
            border-radius: 50%;
            box-shadow: 0 0 8px #2ecc71;
        }

        /* --- VIDEO GRID --- */
        .container {
            padding: 30px 20px;
            max-width: 1400px;
            margin: auto;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .video-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid var(--border);
        }

        .video-card:hover {
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* DIRECT VIDEO ELEMENT - NO THUMBNAIL */
        video {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            display: block;
        }

        .card-info {
            padding: 15px;
        }

        .v-title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .v-meta {
            font-size: 0.85rem;
            color: var(--gray);
            margin-bottom: 15px;
        }

        /* --- DOWNLOAD BUTTON --- */
        .btn-download {
            width: 100%;
            padding: 12px;
            background: var(--primary-red);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-download:hover {
            background: #cc0000;
        }

        /* --- FLOATING SOCIAL BUTTONS --- */
        .social-sidebar {
            position: fixed;
            bottom: 25px;
            right: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 2000;
        }

        .fab-icon {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-decoration: none;
            font-size: 1.6rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .fab-whatsapp { background: #25d366; }
        .fab-channel { background: #0088cc; }
        .fab-icon:hover { transform: scale(1.1); }

        @media (max-width: 768px) {
            .search-container { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">
            <i class="fab fa-youtube"></i> DML TECH
        </a>

        <div class="search-container">
            <input type="text" id="vSearch" placeholder="Search for video content...">
            <button><i class="fas fa-search"></i></button>
        </div>

        <div class="profile-status">
            <div class="online-box">
                <div class="dot"></div> ONLINE
            </div>
            <a href="https://youtube.com/@dmltech" target="_blank" style="color:var(--primary-red); font-size: 1.6rem;">
                <i class="fab fa-youtube"></i>
            </a>
        </div>
    </header>

    <div class="container">
        <div class="video-grid" id="videoGrid">
            <!-- Dynamic Videos Load Here -->
        </div>
    </div>

    <!-- Social Sidebar -->
    <div class="social-sidebar">
        <a href="https://whatsapp.com/channel/..." class="fab-icon fab-channel" title="Join Channel">
            <i class="fas fa-bullhorn"></i>
        </a>
        <a href="https://chat.whatsapp.com/..." class="fab-icon fab-whatsapp" title="WhatsApp Group">
            <i class="fab fa-whatsapp"></i>
        </a>
    </div>

    <script>
        const API_LINK = 'https://ncs.bwmxmd.online/random';

        document.addEventListener('DOMContentLoaded', () => {
            loadFeed(12); // Initial Load of 12 videos
        });

        async function loadFeed(count) {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = ""; // Clear

            for (let i = 0; i < count; i++) {
                try {
                    const response = await fetch(API_LINK);
                    const result = await response.json();
                    if (result.status === 'success') {
                        appendVideoCard(result.data[0]);
                    }
                } catch (error) {
                    console.error("Fetch failed");
                }
            }
        }

        function appendVideoCard(item) {
            const grid = document.getElementById('videoGrid');
            const card = document.createElement('div');
            card.className = 'video-card';
            
            // Note: We use the stream link directly in a video tag.
            // All audio buttons and the thumbnail <img> have been removed.
            card.innerHTML = `
                <video controls preload="metadata">
                    <source src="${item.links.Bwm_stream_link}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <div class="card-info">
                    <span class="v-title">${item.title}</span>
                    <p class="v-meta">DML Tech • Professional Video</p>
                    <button class="btn-download" onclick="triggerDownload('${item.links.Bwm_download_link}')">
                        <i class="fas fa-file-video"></i> DOWNLOAD VIDEO
                    </button>
                </div>
            `;
            grid.appendChild(card);
        }

        function triggerDownload(url) {
            // Opens the direct video download link
            window.open(url, '_blank');
        }

        // Search Filter Logic
        document.getElementById('vSearch').addEventListener('input', function() {
            const query = this.value.toLowerCase();
            const cards = document.querySelectorAll('.video-card');
            
            cards.forEach(card => {
                const title = card.querySelector('.v-title').innerText.toLowerCase();
                card.style.display = title.includes(query) ? "block" : "none";
            });
        });
    </script>
</body>
</html>

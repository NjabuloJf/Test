<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Njabulo Jb- Media Portal</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
        
        :root {
            --yt-red: #ff0000;
            --dark-grey: #606060;
            --light-grey: #f9f9f9;
            --border-color: #e5e5e5;
            --online-green: #2ecc71;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #030303;
            display: flex;
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            border-right: 1px solid var(--border-color);
            padding: 20px 10px;
            background: white;
            z-index: 100;
        }

        .sidebar-brand {
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--yt-red);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-left: 10px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            text-decoration: none;
            color: #030303;
            border-radius: 10px;
            margin-bottom: 5px;
            transition: 0.2s;
        }

        .nav-item:hover {
            background-color: var(--light-grey);
        }

        .nav-item i {
            margin-right: 20px;
            width: 20px;
            font-size: 1.2rem;
        }

        .nav-item.whatsapp { color: #25D366; }
        .nav-item.youtube { color: #FF0000; }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: 240px;
            flex: 1;
            padding: 20px;
        }

        /* --- HEADER & SEARCH --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--yt-red); /* Red Line Theme */
            margin-bottom: 30px;
        }

        .search-container {
            display: flex;
            flex: 0.6;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 20px 0 0 20px;
            outline: none;
        }

        .search-btn {
            padding: 0 20px;
            background: var(--light-grey);
            border: 1px solid var(--border-color);
            border-left: none;
            border-radius: 0 20px 20px 0;
            cursor: pointer;
        }

        .user-status {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
            color: var(--dark-grey);
        }

        .dot {
            height: 10px;
            width: 10px;
            background-color: var(--online-green);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 5px var(--online-green);
        }

        /* --- VIDEO GRID --- */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .video-card {
            background: white;
            transition: 0.3s;
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            overflow: hidden;
            border-radius: 12px;
        }

        .thumbnail-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-info {
            padding: 12px 0;
        }

        .video-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-artist {
            color: var(--dark-grey);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        /* --- CONTROLS --- */
        .media-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-action {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }

        .btn-play { background: #030303; color: white; }
        .btn-reverse { background: var(--light-grey); color: #030303; border: 1px solid var(--border-color); }
        .btn-video { background: var(--yt-red); color: white; }
        .btn-download { background: #2ecc71; color: white; }

        .btn-action:hover { opacity: 0.8; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar span { display: none; }
            .main-content { margin-left: 70px; }
            .search-container { flex: 0.9; }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <i class="fas fa-bolt"></i><span>Njabulo Jb</span>
        </div>
        <a href="#" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="https://youtube.com/" target="_blank" class="nav-item youtube"><i class="fab fa-youtube"></i><span>YouTube Profile</span></a>
        <a href="https://whatsapp.com/channel/..." target="_blank" class="nav-item whatsapp"><i class="fab fa-whatsapp"></i><span>WhatsApp Channel</span></a>
        <a href="#" class="nav-item whatsapp"><i class="fab fa-whatsapp"></i><span>WhatsApp Group</span></a>
        <hr style="margin: 20px 0; border: none; border-top: 1px solid var(--border-color);">
        <a href="#" class="nav-item"><i class="fas fa-history"></i><span>History</span></a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <header>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search songs or videos...">
                <button class="search-btn"><i class="fas fa-search"></i></button>
            </div>
            
            <div class="user-status">
                <div class="status-badge">
                    <span class="dot"></span> Online Status
                </div>
                <button onclick="location.reload()" class="btn-action btn-reverse">
                    <i class="fas fa-sync"></i> Refresh
                </button>
            </div>
        </header>

        <div class="video-grid" id="videoGrid">
            <!-- Videos will load here -->
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetchContent(8); // Fetch 8 items initially
        });

        async function fetchContent(count) {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '<p>Loading latest media...</p>';

            try {
                const promises = [];
                for(let i=0; i<count; i++) {
                    promises.push(fetch('https://ncs.bwmxmd.online/random').then(r => r.json()));
                }

                const results = await Promise.all(promises);
                grid.innerHTML = ''; // Clear loading text

                results.forEach(res => {
                    if(res.status === 'success') {
                        const item = res.data[0];
                        createVideoCard(item);
                    }
                });
            } catch (error) {
                grid.innerHTML = '<p>Error loading content. Check internet connection.</p>';
            }
        }

        function createVideoCard(item) {
            const grid = document.getElementById('videoGrid');
            const card = document.createElement('div');
            card.className = 'video-card';

            card.innerHTML = `
                <div class="thumbnail-container">
                    <img src="${item.links.thumbnail}" alt="thumbnail">
                </div>
                <div class="video-info">
                    <div class="video-title">${item.title}</div>
                    <div class="video-artist">Artist: ${item.artist}</div>
                    
                    <!-- Temporary Audio Player Hidden -->
                    <audio id="audio-${item.id}" src="${item.links.Bwm_stream_link}"></audio>

                    <div class="media-controls">
                        <button class="btn-action btn-reverse" onclick="restartMedia('${item.id}')">
                            <i class="fas fa-backward"></i>
                        </button>
                        <button class="btn-action btn-play" id="play-btn-${item.id}" onclick="togglePlay('${item.id}')">
                            <i class="fas fa-play"></i> Play
                        </button>
                        <button class="btn-action btn-video" onclick="window.open('https://www.youtube.com/results?search_query=${encodeURIComponent(item.title)}', '_blank')">
                            <i class="fas fa-video"></i> Video
                        </button>
                        <button class="btn-action btn-download" onclick="window.open('${item.links.Bwm_download_link}', '_blank')">
                            <i class="fas fa-download"></i>
                        </button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        }

        function togglePlay(id) {
            const audio = document.getElementById('audio-' + id);
            const btn = document.getElementById('play-btn-' + id);
            
            if (audio.paused) {
                audio.play();
                btn.innerHTML = '<i class="fas fa-pause"></i> Pause';
                btn.style.background = "#ff0000";
            } else {
                audio.pause();
                btn.innerHTML = '<i class="fas fa-play"></i> Play';
                btn.style.background = "#030303";
            }
        }

        function restartMedia(id) {
            const audio = document.getElementById('audio-' + id);
            audio.currentTime = 0;
            audio.play();
        }

        // Simple Search Filter
        document.getElementById('searchInput').addEventListener('keyup', function() {
            let filter = this.value.toUpperCase();
            let cards = document.getElementsByClassName('video-card');
            
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].querySelector(".video-title").innerText;
                if (title.toUpperCase().indexOf(filter) > -1) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        });
    </script>
</body>
</html>

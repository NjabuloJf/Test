<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Njabulo Jb Bot Status</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0a0a0b;
            --card-bg: #16161a;
            --accent-color: #00ff88;
            --text-color: #e1e1e1;
            --terminal-bg: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        /* Header Section */
        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .bot-name {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .status-badge {
            background: rgba(0, 255, 136, 0.1);
            color: var(--accent-color);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--accent-color);
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background-color: var(--accent-color);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #2d2d35;
        }

        .stat-card i {
            font-size: 1.5rem;
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
        }

        /* Buttons Section */
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            cursor: pointer;
            border: none;
        }

        .btn-channel { background: #0088cc; color: white; }
        .btn-group-wa { background: #25d366; color: white; }
        .btn-owner { background: #ffffff; color: #000; }

        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        /* Terminal Section */
        .terminal-container {
            background: var(--terminal-bg);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            font-family: 'Fira Code', monospace;
            height: 400px;
            overflow-y: auto;
            position: relative;
        }

        .terminal-header {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }

        .t-dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }

        .log-entry {
            margin-bottom: 5px;
            font-size: 13px;
            line-height: 1.4;
        }

        .log-time { color: #666; margin-right: 10px; }
        .log-success { color: #00ff88; }
        .log-info { color: #00d4ff; }
        .log-warn { color: #ffbd2e; }

        /* Footer */
        footer {
            margin-top: 40px;
            text-align: center;
            padding-bottom: 20px;
            font-size: 1.2rem;
            color: var(--accent-color);
            letter-spacing: 1px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 class="bot-name">NJABULO JB</h1>
            <div class="status-badge">
                <div class="dot"></div>
                Active Show: Online
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <i class="fa-solid fa-clock"></i>
                <span class="stat-value" id="current-time">00:00:00</span>
                <span class="stat-label">Current Time</span>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-calendar-days"></i>
                <span class="stat-value" id="current-date">--/--/----</span>
                <span class="stat-label">System Date</span>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-up-long"></i>
                <span class="stat-value" id="uptime">0h 0m 0s</span>
                <span class="stat-label">Uptime</span>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-down-long"></i>
                <span class="stat-value">0%</span>
                <span class="stat-label">Down Show</span>
            </div>
        </div>

        <div class="btn-group">
            <a href="https://whatsapp.com/channel/yourlink" class="btn btn-channel">
                <i class="fab fa-telegram"></i> Channel
            </a>
            <a href="https://chat.whatsapp.com/yourlink" class="btn btn-group-wa">
                <i class="fab fa-whatsapp"></i> Group
            </a>
            <a href="https://wa.me/27123456789" class="btn btn-owner">
                <i class="fa-solid fa-user-shield"></i> Owner Number
            </a>
        </div>

        <div class="terminal-container" id="terminal">
            <div class="terminal-header">
                <div class="t-dot red"></div>
                <div class="t-dot yellow"></div>
                <div class="t-dot green"></div>
                <span style="font-size: 12px; margin-left: 10px; color: #555;">njabulojb@ubuntu: ~/bot-system</span>
            </div>
            <div id="logs">
                <div class="log-entry"><span class="log-time">[10:00:01]</span> <span class="log-info">Starting Njabulo Jb WhatsApp Bot...</span></div>
            </div>
        </div>

        <footer>
            Pσɯҽɾԃ Ⴆყ ɳʝαႦυʅσ ʝႦ
        </footer>
    </div>

    <script>
        // Update Time and Date
        function updateClock() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString();
            document.getElementById('current-date').innerText = now.toLocaleDateString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Uptime Counter
        let seconds = 0;
        function updateUptime() {
            seconds++;
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            document.getElementById('uptime').innerText = `${h}h ${m}m ${s}s`;
        }
        setInterval(updateUptime, 1000);

        // Terminal Simulator
        const logsContainer = document.getElementById('logs');
        const terminal = document.getElementById('terminal');
        
        const possibleLogs = [
            "Connecting to WhatsApp Multi-Device...",
            "Validating Session JSON...",
            "Loading NJABULO JB Plugins...",
            "Checking database connection...",
            "Syncing contacts...",
            "Fetching group metadata...",
            "Ping: 45ms",
            "Memory Usage: 124MB / 512MB",
            "Request received from +27xxxxxxx",
            "Menu command triggered",
            "System check: Healthy",
            "Auto-read status enabled",
            "Antidelete module active",
            "Downloading media cache...",
            "Refreshing API tokens..."
        ];

        let logCount = 0;
        const maxLogs = 150;

        function addLog(text, type = 'info') {
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour12: false });
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            let colorClass = 'log-info';
            if(type === 'success') colorClass = 'log-success';
            if(type === 'warn') colorClass = 'log-warn';

            entry.innerHTML = `<span class="log-time">[${timeStr}]</span> <span class="${colorClass}">${text}</span>`;
            logsContainer.appendChild(entry);
            
            // Auto scroll to bottom
            terminal.scrollTop = terminal.scrollHeight;
            logCount++;
        }

        // Initial Boot Sequence
        setTimeout(() => addLog("Njabulo Jb WhatsApp bot online", "success"), 1000);
        setTimeout(() => addLog("Loading Menu System...", "info"), 2000);
        setTimeout(() => addLog("Ping speed: 24ms", "warn"), 2500);

        // Generate "More text loading" up to 150
        const interval = setInterval(() => {
            if (logCount >= maxLogs) {
                clearInterval(interval);
                addLog("--- 150 Logs Loaded. Monitoring System Active ---", "success");
                return;
            }
            const randomMsg = possibleLogs[Math.floor(Math.random() * possibleLogs.length)];
            addLog(randomMsg);
        }, 150);

    </script>
</body>
  </html>

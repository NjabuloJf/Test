<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Njabulo Jb - MP3 & MP4 Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        /* Liquid Glass Effect */
        .glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        .glass-white {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        /* Header */
        .header {
            padding: 20px;
            margin: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .profile-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.5);
        }

        .profile-name {
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .profile-name small {
            display: block;
            font-size: 14px;
            opacity: 0.8;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 25px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Status Bar */
        .status-bar {
            margin: 0 20px 20px 20px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-stats {
            display: flex;
            align-items: center;
            gap: 20px;
            color: #333;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .github-link {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #333;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .github-link:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        /* Search Section */
        .search-container {
            margin: 0 20px 30px 20px;
            padding: 30px;
            text-align: center;
        }

        .search-title {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .search-box {
            display: flex;
            max-width: 600px;
            margin: 0 auto;
            gap: 10px;
        }

        .search-input {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .search-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        /* Video Grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            padding: 0 20px;
            margin-bottom: 50px;
        }

        .video-card {
            padding: 20px;
            border-radius: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .video-thumbnail {
            width: 100%;
            height: 180px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }

        .video-thumbnail i {
            font-size: 48px;
            color: white;
            opacity: 0.8;
        }

        .video-info h3 {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 12px;
            color: #666;
        }

        .video-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .action-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .btn-mp3 {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
        }

        .btn-mp4 {
            background: linear-gradient(45deg, #4834d4, #686de0);
            color: white;
        }

        .btn-watch {
            background: linear-gradient(45deg, #00d2d3, #54a0ff);
            color: white;
        }

        .btn-play {
            background: linear-gradient(45deg, #5f27cd, #a55eea);
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Loading and Error States */
        .loading {
            text-align: center;
            padding: 50px;
            color: #333;
        }

        .loading i {
            font-size: 48px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(255, 107, 107, 0.9);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            margin: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .success-message {
            background: rgba(46, 213, 115, 0.9);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            margin: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            margin-top: 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            font-weight: bold;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 20px;
            }

            .nav-menu {
                flex-wrap: wrap;
                justify-content: center;
            }

            .status-bar {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .search-box {
                flex-direction: column;
            }

            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header glass">
        <div class="profile-section">
            <img src="public/fanajb.png" alt="Njabulo Jb" class="profile-img">
            <div class="profile-name">
                Njabulo Jb
                <small>Download Hub</small>
            </div>
        </div>
        <nav class="nav-menu">
            <a href="#" class="nav-item">
                <i class="fas fa-users"></i>
                Groups
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-broadcast-tower"></i>
                Channels
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-download"></i>
                Downloads
            </a>
        </nav>
    </header>

    <!-- Status Bar -->
    <div class="status-bar glass-white">
        <div class="user-stats">
            <div class="stat-item">
                <i class="fas fa-users" style="color: #667eea;"></i>
                <span id="totalUsers">1,247</span> Total Users
            </div>
            <div class="stat-item">
                <i class="fas fa-heart" style="color: #ff6b6b;"></i>
                <span id="totalLoves">892</span> Loves
            </div>
        </div>
        <a href="https://github.com/NjabuloJ/Njabulo-Jb" target="_blank" class="github-link">
            <i class="fab fa-github"></i>
            <i class="fas fa-star"></i>
            Star Repository
        </a>
    </div>

    <!-- Search Container -->
    <div class="search-container glass-white">
        <h1 class="search-title">
            <i class="fas fa-music"></i>
            Search & Download MP3 / MP4
        </h1>
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="Enter song name, artist, or YouTube URL...">
            <button class="search-btn" id="searchBtn">
                <i class="fas fa-search"></i>
                Search
            </button>
        </div>
    </div>

    <!-- Messages -->
    <div id="messageContainer"></div>

    <!-- Loading -->
    <div id="loadingContainer" class="loading glass-white" style="display: none;">
        <i class="fas fa-spinner"></i>
        <h3>Searching for videos...</h3>
        <p>Please wait while we find the best results for you</p>
    </div>

    <!-- Video Grid -->
    <div class="video-grid" id="videoGrid">
        <!-- Sample videos will be loaded here -->
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>Made by Njabulo Jb Tech 2026</p>
        <p><i class="fas fa-code"></i> Built with love and passion</p>
    </footer>

    <script>
        // Global variables
        let currentVideos = [];
        let isLoading = false;

        // Sample video data for initial display
        const sampleVideos = [
            {
                videoId: 'dQw4w9WgXcQ',
                title: 'Rick Astley - Never Gonna Give You Up (Official Music Video)',
                artist: 'Rick Astley',
                duration: '3:33',
                uploadDate: '2009-10-25'
            },
            {
                videoId: 'kJQP7kiw5Fk',
                title: 'Luis Fonsi - Despacito ft. Daddy Yankee',
                artist: 'Luis Fonsi',
                duration: '4:42',
                uploadDate: '2017-01-12'
            },
            {
                videoId: 'fJ9rUzIMcZQ',
                title: 'Queen - Bohemian Rhapsody (Official Video)',
                artist: 'Queen',
                duration: '5:55',
                uploadDate: '2008-08-01'
            }
        ];

        // Initialize the app
        document.addEventListener('DOMContentLoaded', function() {
            loadSampleVideos();
            setupEventListeners();
            updateStats();
        });

        // Setup event listeners
        function setupEventListeners() {
            const searchBtn = document.getElementById('searchBtn');
            const searchInput = document.getElementById('searchInput');

            searchBtn.addEventListener('click', performSearch);
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });
        }

        // Load sample videos on page load
        function loadSampleVideos() {
            // Generate more sample videos to reach 200+
            const genres = ['Pop', 'Rock', 'Hip Hop', 'Electronic', 'Jazz', 'Classical', 'R&B', 'Country'];
            const artists = ['Artist One', 'Music Maker', 'Sound Creator', 'Beat Master', 'Melody King', 'Rhythm Queen'];
            
            for (let i = 0; i < 200; i++) {
                const randomGenre = genres[Math.floor(Math.random() * genres.length)];
                const randomArtist = artists[Math.floor(Math.random() * artists.length)];
                const randomDuration = `${Math.floor(Math.random() * 5) + 2}:${Math.floor(Math.random() * 60).toString().padStart(2, '0')}`;
                const randomDate = new Date(2020 + Math.floor(Math.random() * 4), Math.floor(Math.random() * 12), Math.floor(Math.random() * 28) + 1);
                
                sampleVideos.push({
                    videoId: `sample_${i}`,
                    title: `${randomGenre} Song ${i + 1} - Amazing Track`,
                    artist: randomArtist,
                    duration: randomDuration,
                    uploadDate: randomDate.toISOString().split('T')[0]
                });
            }
            
            currentVideos = sampleVideos;
            renderVideos(currentVideos);
        }

        // Perform search
        async function performSearch() {
            const searchInput = document.getElementById('searchInput');
            const query = searchInput.value.trim();
            
            if (!query) {
                showMessage('Please enter a search term', 'error');
                return;
            }

            if (isLoading) return;
 
                setLoading(true);
                clearMessages();

                try {
                    // Simulate API call for demo (replace with actual API)
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    
                    // For demo purposes, filter sample videos based on search
                    const filteredVideos = sampleVideos.filter(video => 
                        video.title.toLowerCase().includes(query.toLowerCase()) ||
                        video.artist.toLowerCase().includes(query.toLowerCase())
                    );

                    if (filteredVideos.length === 0) {
                        // If no matches found, show all videos
                        currentVideos = sampleVideos;
                        showMessage(`No exact matches found for "${query}". Showing all available videos.`, 'info');
                    } else {
                        currentVideos = filteredVideos;
                        showMessage(`Found ${filteredVideos.length} results for "${query}"`, 'success');
                    }

                    renderVideos(currentVideos);
                    
                } catch (error) {
                    console.error('Search error:', error);
                    showMessage('Something went wrong while searching. Please try again.', 'error');
                } finally {
                    setLoading(false);
                }
            }

            // Render videos to the grid
            function renderVideos(videos) {
                const videoGrid = document.getElementById('videoGrid');
                videoGrid.innerHTML = '';

                videos.forEach((video, index) => {
                    const videoCard = createVideoCard(video, index);
                    videoGrid.appendChild(videoCard);
                });
            }

            // Create individual video card
            function createVideoCard(video, index) {
                const card = document.createElement('div');
                card.className = 'video-card glass-white';
                
                const uploadDate = new Date(video.uploadDate).toLocaleDateString();
                
                card.innerHTML = `
                    <div class="video-thumbnail">
                        <i class="fas fa-play"></i>
                    </div>
                    <div class="video-info">
                        <h3>${video.title}</h3>
                        <div class="video-meta">
                            <span><i class="fas fa-user"></i> ${video.artist}</span>
                            <span><i class="fas fa-clock"></i> ${video.duration}</span>
                        </div>
                        <div class="video-meta">
                            <span><i class="fas fa-calendar"></i> ${uploadDate}</span>
                            <span><i class="fas fa-eye"></i> ${Math.floor(Math.random() * 1000000).toLocaleString()} views</span>
                        </div>
                        <div class="video-actions">
                            <button class="action-btn btn-mp3" onclick="downloadAudio('${video.videoId}', '${video.title}')">
                                <i class="fas fa-music"></i> MP3
                            </button>
                            <button class="action-btn btn-mp4" onclick="downloadVideo('${video.videoId}', '${video.title}')">
                                <i class="fas fa-video"></i> MP4
                            </button>
                            <button class="action-btn btn-watch" onclick="watchVideo('${video.videoId}', '${video.title}')">
                                <i class="fas fa-external-link-alt"></i> Watch
                            </button>
                            <button class="action-btn btn-play" onclick="playSong('${video.videoId}', '${video.title}')">
                                <i class="fas fa-play"></i> Play
                            </button>
                        </div>
                    </div>
                `;
                
                return card;
            }

            // Download audio function
            async function downloadAudio(videoId, title) {
                try {
                    showMessage(`Preparing MP3 download for: ${title}`, 'info');
                    
                    // Use the provided API
                    const apiURL = `https://noobs-api.top/dipto/ytDl3?link=${encodeURIComponent(videoId)}&format=mp3`;
                    
                    const response = await axios.get(apiURL);
                    
                    if (response.status !== 200) {
                        throw new Error('Failed to retrieve the MP3 download link');
                    }
                    
                    const data = response.data;
                    
                    if (!data.downloadLink) {
                        throw new Error('Failed to retrieve the MP3 download link');
                    }
                    
                    // Create download link
                    const downloadLink = document.createElement('a');
                    downloadLink.href = data.downloadLink;
                    downloadLink.download = `${title}.mp3`;
                    downloadLink.target = '_blank';
                    document.body.appendChild(downloadLink);
                    downloadLink.click();
                    document.body.removeChild(downloadLink);
                    
                    showMessage(`MP3 download started for: ${title}`, 'success');
                    updateStats();
                    
                } catch (error) {
                    console.error('Download error:', error);
                    showMessage(`Error downloading MP3: ${error.message}`, 'error');
                }
            }

            // Download video function
            async function downloadVideo(videoId, title) {
                try {
                    showMessage(`Preparing MP4 download for: ${title}`, 'info');
                    
                    // Use the provided API for MP4
                    const apiURL = `https://noobs-api.top/dipto/ytDl3?link=${encodeURIComponent(videoId)}&format=mp4`;
                    
                    const response = await axios.get(apiURL);
                    
                    if (response.status !== 200) {
                        throw new Error('Failed to retrieve the MP4 download link');
                    }
                    
                    const data = response.data;
                    
                    if (!data.downloadLink) {
                        throw new Error('Failed to retrieve the MP4 download link');
                    }
                    
                    // Create download link
                    const downloadLink = document.createElement('a');
                    downloadLink.href = data.downloadLink;
                    downloadLink.download = `${title}.mp4`;
                    downloadLink.target = '_blank';
                    document.body.appendChild(downloadLink);
                    downloadLink.click();
                    document.body.removeChild(downloadLink);
                    
                    showMessage(`MP4 download started for: ${title}`, 'success');
                    updateStats();
                    
                } catch (error) {
                    console.error('Download error:', error);
                    showMessage(`Error downloading MP4: ${error.message}`, 'error');
                }
            }

            // Watch video function
            function watchVideo(videoId, title) {
                const youtubeUrl = `https://www.youtube.com/watch?v=${videoId}`;
                window.open(youtubeUrl, '_blank');
                showMessage(`Opening video: ${title}`, 'success');
                updateStats();
            }

            // Play song function
            function playSong(videoId, title) {
                showMessage(`Playing: ${title}`, 'success');
                // Here you could implement an audio player
                // For now, we'll just open the YouTube video
                const youtubeUrl = `https://www.youtube.com/watch?v=${videoId}`;
                window.open(youtubeUrl, '_blank');
                updateStats();
            }

            // Set loading state
            function setLoading(loading) {
                isLoading = loading;
                const loadingContainer = document.getElementById('loadingContainer');
                const videoGrid = document.getElementById('videoGrid');
                
                if (loading) {
                    loadingContainer.style.display = 'block';
                    videoGrid.style.opacity = '0.5';
                } else {
                    loadingContainer.style.display = 'none';
                    videoGrid.style.opacity = '1';
                }
            }

            // Show message function
            function showMessage(message, type = 'info') {
                const messageContainer = document.getElementById('messageContainer');
                const messageDiv = document.createElement('div');
                
                let className = 'success-message';
                if (type === 'error') className = 'error-message';
                if (type === 'info') className = 'success-message';
                
                messageDiv.className = className;
                messageDiv.innerHTML = `
                    <i class="fas fa-${type === 'error' ? 'exclamation-triangle' : type === 'success' ? 'check-circle' : 'info-circle'}"></i>
                    ${message}
                `;
                
                messageContainer.appendChild(messageDiv);
                
                // Auto remove message after 5 seconds
                setTimeout(() => {
                    if (messageDiv.parentNode) {
                        messageDiv.parentNode.removeChild(messageDiv);
                    }
                }, 5000);
            }

            // Clear messages
            function clearMessages() {
                const messageContainer = document.getElementById('messageContainer');
                messageContainer.innerHTML = '';
            }

            // Update stats
            function updateStats() {
                const totalUsers = document.getElementById('totalUsers');
                const totalLoves = document.getElementById('totalLoves');
                
                // Simulate increasing stats
                const currentUserCount = parseInt(totalUsers.textContent.replace(',', ''));
                const currentLoveCount = parseInt(totalLoves.textContent.replace(',', ''));
                
                totalUsers.textContent = (currentUserCount + Math.floor(Math.random() * 5) + 1).toLocaleString();
                totalLoves.textContent = (currentLoveCount + Math.floor(Math.random() * 3) + 1).toLocaleString();
            }

            // Error handling for API calls
            window.addEventListener('unhandledrejection', function(event) {
                console.error('Unhandled promise rejection:', event.reason);
                showMessage('An unexpected error occurred. Please try again.', 'error');
            });

            // Handle network errors
            window.addEventListener('offline', function() {
                showMessage('You are offline. Please check your internet connection.', 'error');
            });

            window.addEventListener('online', function() {
                showMessage('Connection restored!', 'success');
            });
        </script>
    </body>
    </html>
